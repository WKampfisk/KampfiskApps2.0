# Optional interim host: GitHub Pages (root base).
# For production on IONOS Deploy Now, connect this repo at https://ionos.space
# — Deploy Now will add its own workflow (do not remove both if both are active).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install & build
        run: |
          npm ci
          npm run build
        env:
          # Root domain / custom domain. For project pages set VITE_BASE=/KampfiskApps2.0/
          VITE_BASE: /
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
